data:
  assets: ['SPY', 'QQQ', 'TLT', 'GLD', 'VNQ']
  start_date: '2010-01-01'
  end_date: '2023-12-31'
  train_end_date: '2020-12-31'

episodes:
  length: 60
  batch_size: 32

model:
  latent_dim: 8
  encoder:
    hidden_size: 64
    n_layers: 1
  policy:
    hidden_size: 128
    n_layers: 2

training:
  num_iterations: 10000
  episodes_per_iteration: 32
  learning_rate: 0.0003
  save_every: 100