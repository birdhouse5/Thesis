{
  "experiment_name": "architecture_sweep",
  "training": {
    "num_iterations": 300,
    "episode_length": 20,
    "episodes_per_iteration": 3,
    "vae_updates": "SWEEP:[5,10]",
    "buffer_size": 150,
    "eval_frequency": 100
  },
  "model": {
    "latent_dim": "SWEEP:[4,6,8,12]",
    "encoder_hidden": "SWEEP:[64,128,192]",
    "encoder_layers": "SWEEP:[1,2]",
    "encoder_rnn_type": "SWEEP:[\"GRU\",\"LSTM\"]",
    "decoder_hidden": 128,
    "policy_hidden": 256,
    "encoder_dropout": 0.1,
    "encoder_bidirectional": false
  },
  "portfolio": {
    "short_selling": true,
    "max_short_ratio": 0.3,
    "transaction_cost": 0.001
  },
  "learning_rates": {
    "policy_lr": 0.001,
    "vae_encoder_lr": 0.001,
    "vae_decoder_lr": 0.001
  },
  "environment": {
    "device": "auto",
    "data_path": "data/sp500_rl_ready_cleaned.parquet"
  }
}