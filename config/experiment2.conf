{
  "experiment_name": "standard_training",
  "training": {
    "num_iterations": 500,
    "episode_length": 30,
    "episodes_per_iteration": 5,
    "vae_updates": 10,
    "buffer_size": 200,
    "eval_frequency": 50
  },
  "model": {
    "latent_dim": 5,
    "encoder_hidden": 128,
    "decoder_hidden": 128,
    "policy_hidden": 256
  },
  "portfolio": {
    "short_selling": true,
    "max_short_ratio": 0.3,
    "transaction_cost": 0.001
  },
  "learning_rates": {
    "policy_lr": 0.0001,
    "vae_encoder_lr": 0.0001,
    "vae_decoder_lr": 0.0001
  },
  "environment": {
    "device": "auto",
    "data_path": "data/sp500_rl_ready_cleaned.parquet"
  }
}