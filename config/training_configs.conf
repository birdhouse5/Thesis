# config/training_configs.conf
# VariBAD Training Configuration File
# Edit this file to change training parameters without modifying scripts

# =============================================================================
# ACTIVE CONFIGURATION
# Uncomment ONE configuration block below to use it
# =============================================================================

# POLICY_FOCUSED - For when VAE learns but policy doesn't
# Good for: Fixing poor portfolio performance, better reward learning
ACTIVE_CONFIG="POLICY_FOCUSED"
POLICY_FOCUSED_NUM_ITERATIONS=300
POLICY_FOCUSED_EPISODE_LENGTH=60
POLICY_FOCUSED_EPISODES_PER_ITERATION=12
POLICY_FOCUSED_VAE_UPDATES=5
POLICY_FOCUSED_LATENT_DIM=3
POLICY_FOCUSED_EXTRA_ARGS="--short_selling"

# DEFAULT_GPU - Balanced training for GPU
# Good for: First runs, general experimentation
#ACTIVE_CONFIG="DEFAULT_GPU"
DEFAULT_GPU_NUM_ITERATIONS=500
DEFAULT_GPU_EPISODE_LENGTH=60
DEFAULT_GPU_EPISODES_PER_ITERATION=10
DEFAULT_GPU_VAE_UPDATES=15
DEFAULT_GPU_LATENT_DIM=8
DEFAULT_GPU_EXTRA_ARGS="--short_selling"

# QUICK_TEST - Fast test run
# Good for: Testing setup, debugging
#ACTIVE_CONFIG="QUICK_TEST"
QUICK_TEST_NUM_ITERATIONS=20
QUICK_TEST_EPISODE_LENGTH=15
QUICK_TEST_EPISODES_PER_ITERATION=3
QUICK_TEST_VAE_UPDATES=3
QUICK_TEST_LATENT_DIM=2
QUICK_TEST_EXTRA_ARGS=""

# VAE_FOCUSED - More VAE training
# Good for: When regime detection is poor
#ACTIVE_CONFIG="VAE_FOCUSED"
VAE_FOCUSED_NUM_ITERATIONS=400
VAE_FOCUSED_EPISODE_LENGTH=45
VAE_FOCUSED_EPISODES_PER_ITERATION=8
VAE_FOCUSED_VAE_UPDATES=25
VAE_FOCUSED_LATENT_DIM=10
VAE_FOCUSED_EXTRA_ARGS="--short_selling"

# LONG_HORIZON - Longer episodes for better portfolio decisions
# Good for: When you want longer-term trading strategies
#ACTIVE_CONFIG="LONG_HORIZON"
LONG_HORIZON_NUM_ITERATIONS=250
LONG_HORIZON_EPISODE_LENGTH=120
LONG_HORIZON_EPISODES_PER_ITERATION=8
LONG_HORIZON_VAE_UPDATES=10
LONG_HORIZON_LATENT_DIM=6
LONG_HORIZON_EXTRA_ARGS="--short_selling"

# AGGRESSIVE_POLICY - Maximum policy learning focus
# Good for: When policy is really struggling to learn
#ACTIVE_CONFIG="AGGRESSIVE_POLICY"
AGGRESSIVE_POLICY_NUM_ITERATIONS=400
AGGRESSIVE_POLICY_EPISODE_LENGTH=90
AGGRESSIVE_POLICY_EPISODES_PER_ITERATION=20
AGGRESSIVE_POLICY_VAE_UPDATES=2
AGGRESSIVE_POLICY_LATENT_DIM=2
AGGRESSIVE_POLICY_EXTRA_ARGS="--short_selling"

# CPU_OPTIMIZED - For CPU training
# Good for: When no GPU available
#ACTIVE_CONFIG="CPU_OPTIMIZED"
CPU_OPTIMIZED_NUM_ITERATIONS=150
CPU_OPTIMIZED_EPISODE_LENGTH=30
CPU_OPTIMIZED_EPISODES_PER_ITERATION=4
CPU_OPTIMIZED_VAE_UPDATES=6
CPU_OPTIMIZED_LATENT_DIM=4
CPU_OPTIMIZED_EXTRA_ARGS=""

# =============================================================================
# ADVANCED SETTINGS (Optional)
# =============================================================================

# Device selection (auto, cpu, cuda)
DEVICE_PREFERENCE="auto"

# Evaluation frequency
EVAL_FREQUENCY=25

# Save frequency  
SAVE_FREQUENCY=50

# Buffer size
BUFFER_SIZE=500

# =============================================================================
# EXPERIMENT TRACKING
# =============================================================================

# Experiment description (will be added to logs and archives)
EXPERIMENT_NAME="policy_learning_focus_v1"
EXPERIMENT_DESCRIPTION="Focusing on policy learning after VAE showed good convergence but poor portfolio performance"

# =============================================================================
# NOTES
# =============================================================================
# 
# Parameter Guidelines:
# - num_iterations: Total training iterations (more = longer training)
# - episode_length: Trading days per episode (30-120 recommended)  
# - episodes_per_iteration: Policy training data per iteration (more = better policy learning)
# - vae_updates: VAE training steps per iteration (less if VAE already works)
# - latent_dim: Regime representation size (smaller = easier for policy to use)
# - extra_args: Additional arguments like --short_selling
#
# Quick Config Changes:
# 1. Change ACTIVE_CONFIG="CONFIG_NAME" to switch configurations
# 2. Edit the parameters for any configuration block
# 3. Add your own configuration block following the pattern
# 4. Run ./start_training.sh - it will automatically use the active config
#