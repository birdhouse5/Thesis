    "policy_hidden": 128
  },
  "portfolio": {
    "short_selling": true,
    "max_short_ratio": 0.3,
    "transaction_cost": 0.001
  },
  "learning_rates": {
    "policy_lr": 0.001,
    "vae_encoder_lr": 0.001,
    "vae_decoder_lr": 0.001
  },
  "environment": {
    "device": "auto",
    "data_path": "data/sp500_rl_ready_cleaned.parquet"
  }
}