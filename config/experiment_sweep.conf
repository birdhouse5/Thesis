{
  "experiment_name": "architecture_sweep",
  "training": {
    "num_iterations": 200,
    "episode_length": 20,
    "episodes_per_iteration": 3,
    "vae_updates": "SWEEP:[5,10,15]",
    "buffer_size": 100,
    "eval_frequency": 50
  },
  "model": {
    "latent_dim": "SWEEP:[4,6,8]",
    "encoder_hidden": "SWEEP:[64,128]",
