{
  "experiment_name": "training_dynamics_sweep",
  "training": {
    "num_iterations": 400,
    "episode_length": 25,
    "episodes_per_iteration": "SWEEP:[3,5]",
    "vae_updates": "SWEEP:[8,12,16]",
    "buffer_size": 200,
    "eval_frequency": 100,
    "warmup_steps": "SWEEP:[0,50]"
  },
  "model": {
    "latent_dim": 8,
    "encoder_hidden": 128,
    "decoder_hidden": 128,
    "policy_hidden": 256,
    "trajectory_memory": "SWEEP:[8,15]",
    "max_sequence_length": 20
  },
  "schedules": {
    "lr_schedule": "SWEEP:[\"constant\",\"cosine\"]",
    "vae_only_steps": "SWEEP:[0,25]",
    "initial_exploration_noise": 0.05,
    "final_exploration_noise": 0.01,
    "exploration_decay": "linear"
  },
  "portfolio": {
    "short_selling": true,
    "max_short_ratio": 0.3,
    "transaction_cost": 0.001
  },
  "learning_rates": {
    "policy_lr": "SWEEP:[0.0005,0.001]",
    "vae_encoder_lr": 0.001,
    "vae_decoder_lr": 0.001
  },
  "environment": {
    "device": "auto",
    "data_path": "data/sp500_rl_ready_cleaned.parquet"
  }
}