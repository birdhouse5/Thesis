# config/training.conf
# Simple VariBAD training parameters

# Training parameters
NUM_ITERATIONS=500
EPISODE_LENGTH=30          # Shorter episodes
EPISODES_PER_ITERATION=5   # Fewer episodes per iteration  
VAE_UPDATES=8              # Fewer VAE updates
LATENT_DIM=5               # Smaller latent space
BUFFER_SIZE=200            # Smaller buffer
SHORT_SELLING=false        # Disable short selling temporarily
DEVICE=auto
EVAL_FREQUENCY=25
SAVE_FREQUENCY=50
LOG_LEVEL=INFO

POLICY_LR=1e-4
VAE_ENCODER_LR=1e-4
VAE_DECODER_LR=1e-4